    <link rel="preconnect" href="[https://fonts.gstatic.com](https://fonts.gstatic.com)" crossorigin>
    <link href="[https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;500;600&family=Playfair+Display:wght@400;600;700&display=swap](https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;500;600&family=Playfair+Display:wght@400;600;700&display=swap)" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #2a2a2a;
            --bg-card: #333333;
            --gold-primary: #C8A97E;
            --gold-light: #E0C89E;
            --burgundy: #7A203F;
            --text-light: #F0F0F0;
            --text-muted: #A0A0A0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-dark);
            font-family: 'Montserrat', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            padding-bottom: 100px; /* Space for the fixed footer */
            color: var(--text-light);
        }

        /* Main Card Container */
        .card-container {
            background-color: var(--bg-card);
            width: 100%;
            max-width: 420px;
            border-radius: 18px;
            overflow: hidden;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5), inset 0 0 0 1px rgba(200, 169, 126, 0.1);
            position: relative;
            display: flex;
            flex-direction: column;
        }

        /* Top Brand Section */
        .brand-header {
            text-align: center;
            padding: 1px 20px 1px;
            position: relative;
            border-bottom: 1px solid rgba(200, 169, 126, 0.2);
        }

        .brand-header::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at top, rgba(200, 169, 126, 0.05) 0%, transparent 70%);
            pointer-events: none;
        }

        /* Brand Logo */
        .logo-b {
            width: 180px;
            height: 180px;
            background-color: transparent;
            margin: 20px auto;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .logo-b img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            padding: 10px;
            box-sizing: border-box;
        }

        /* Circular Photo Container */
        .photo-container {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 5px solid white;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            margin: 20px auto 30px auto;
        }

        .photo-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Profile Details Section */
        .profile-section {
            padding: 1px 30px;
            text-align: center;
        }

        .profile-name {
            font-family: 'Playfair Display', serif;
            font-size: 26px;
            font-weight: 600;
            letter-spacing: 2px;
            color: var(--text-light);
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .profile-title {
            font-size: 12px;
            font-weight: 400;
            letter-spacing: 3px;
            color: var(--gold-primary);
            text-transform: uppercase;
            margin-bottom: 30px;
        }

        /* Contact Links */
        .contact-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 15px;
            padding-bottom: 18px;
margin-top: 30px;
        }

        .contact-item {
            display: flex;
            align-items: center;
            background: rgba(0, 0, 0, 0.2);
            padding: 16px 20px;
            border-radius: 12px;
            text-decoration: none;
            color: var(--text-light);
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .contact-item:hover {
            background: rgba(200, 169, 126, 0.1);
            border-color: rgba(200, 169, 126, 0.3);
            transform: translateY(-2px);
        }

        .contact-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(200, 169, 126, 0.1);
            display: flex;
            justify-content: center;
            align-items: center;
            margin-right: 15px;
            flex-shrink: 0;
            color: var(--gold-primary);
        }

        .contact-icon svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }

        .contact-text-wrap {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        .contact-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 3px;
        }

        .contact-value {
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        /* Floating Action Button Container */
        .fixed-action-container {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 420px;
            padding: 0 30px;
            z-index: 1000;
            pointer-events: none;
        }

        .fixed-action-container button {
            pointer-events: auto;
        }

      
    </style>
</head>
