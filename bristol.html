<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bristol Hotel - Digital Business Card</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;500;600&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #2a2a2a;
            --bg-card: #333333;
            --gold-primary: #C8A97E;
            --gold-light: #E0C89E;
            --burgundy: #7A203F;
            --text-light: #F0F0F0;
            --text-muted: #A0A0A0;
            --tripadvisor-green: #00AF87;
            --google-blue: #4285F4; /* Official Google Blue */
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-dark);
            font-family: 'Montserrat', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            padding-bottom: 100px; 
            color: var(--text-light);
        }

        .card-container {
            background-color: var(--bg-card);
            width: 100%;
            max-width: 420px;
            border-radius: 18px;
            overflow: hidden;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5), inset 0 0 0 1px rgba(200, 169, 126, 0.1);
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .brand-header {
            text-align: center;
            padding: 1px 20px 1px;
            position: relative;
            border-bottom: 1px solid rgba(200, 169, 126, 0.2);
        }

        .logo-b {
            width: 180px;
            height: 180px;
            margin: 20px auto;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .logo-b img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            padding: 10px;
        }

        .profile-section {
            padding: 1px 30px;
            text-align: center;
        }

        .contact-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 15px;
            padding-bottom: 18px;
            margin-top: 30px;
        }

        .contact-item {
            display: flex;
            flex-direction: column;
            background: rgba(0, 0, 0, 0.2);
            padding: 16px 20px;
            border-radius: 12px;
            text-decoration: none;
            color: var(--text-light);
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.03);
            overflow: hidden;
        }

        .contact-item:hover {
            background: rgba(200, 169, 126, 0.1);
            border-color: rgba(200, 169, 126, 0.3);
            transform: translateY(-2px);
        }

        /* Branded Buttons Base Styles */
        .tripadvisor-item, .google-maps-item {
            border: none !important;
        }

        .tripadvisor-item .contact-icon, .google-maps-item .contact-icon {
            background: rgba(255, 255, 255, 0.2);
            color: white;
        }

        .tripadvisor-item .contact-label, .tripadvisor-item .contact-value-c,
        .google-maps-item .contact-label, .google-maps-item .contact-value {
            color: white !important;
        }

        /* TripAdvisor Branding */
        .tripadvisor-item { background: var(--tripadvisor-green) !important; }
        .tripadvisor-item:hover { background: #008f6e !important; }

        /* Google Maps Branding */
        .google-maps-item { background: var(--google-blue) !important; }
        .google-maps-item:hover { background: #3367d6 !important; }

        .contact-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(200, 169, 126, 0.1);
            display: flex;
            justify-content: center;
            align-items: center;
            margin-right: 15px;
            flex-shrink: 0;
            color: var(--gold-primary);
        }

        .contact-icon svg {
            width: 22px;
            height: 22px;
            fill: currentColor;
        }

        .contact-text-wrap {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        .contact-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 3px;
        }

        .contact-value, .contact-value-c {
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 0.5px;
            text-align: left;
        }

        .contact-value-c { text-transform: capitalize; }
        .contact-value { text-transform: lowercase; }

        .map-wrapper {
            width: 100%;
            height: 180px;
            border-radius: 8px;
            overflow: hidden;
            margin-top: 12px;
            border: 2px solid rgba(255, 255, 255, 0.1);
        }

        .map-wrapper iframe { width: 100%; height: 100%; border: 0; }

        .fixed-action-container {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 420px;
            padding: 0 30px;
            z-index: 1000;
            pointer-events: none;
        }

        .fixed-action-container a, .fixed-action-container button { pointer-events: auto; }

        .btn-save {
            display: block;
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #D4AF37 0%, #AA771C 100%);
            color: #111;
            text-align: center;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            letter-spacing: 1px;
            text-transform: uppercase;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .btn-save:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
        }
    </style>
</head>
